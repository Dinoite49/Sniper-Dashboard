<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SignalSync Pro • Macro Intelligence v2.0</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* [MANTIDOS SEUS ESTILOS CSS ORIGINAIS QUE SÃO EXCELENTES] */
        :root {
            --bg: #030508; --surface: #080C14; --surface2: #0D1220;
            --border: rgba(100,150,255,0.08); --border2: rgba(100,150,255,0.15);
            --accent: #4DFFB8; --accent2: #7B61FF; --accent3: #FF6B6B;
            --gold: #FFD166; --buy: #00E676; --sell: #FF3D71;
            --neutral: #FFB547; --text: #E8EDF5; --text2: #8B95A8;
            --text3: #4A5568;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; overflow: hidden; display: flex;
            background-image:
                radial-gradient(ellipse 60% 40% at 80% 10%, rgba(77,255,184,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 10% 80%, rgba(123,97,255,0.04) 0%, transparent 60%);
        }

        /* [RESTANTE DO SEU CSS MANTIDO...] */
        /* Adicionei aqui apenas correções pontuais de layout para o gráfico */
        #tv-container { height: 100%; min-height: 400px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; gap: 4px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; color: var(--text2); cursor: pointer; transition: all 0.2s; font-size: 13px; }
        .nav-item.active { background: rgba(77,255,184,0.08); color: var(--accent); border: 1px solid rgba(77,255,184,0.15); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .content-area.active-tab { display: block; }
        .dash-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; height: 100%; }
        .btn-analyze { width: 100%; padding: 16px; background: linear-gradient(135deg, rgba(77,255,184,0.15), rgba(123,97,255,0.15)); border: 1px solid rgba(77,255,184,0.3); border-radius: 12px; color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .terminal { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text2); min-height: 120px; }
    </style>
</head>
<body>

<script>
// ─── CONFIGURAÇÃO CORRIGIDA ────────────────────────────────────────────────
const ASSETS = {
    crypto: [{name:"BTC/USDT", symbol:"BINANCE:BTCUSDT", ticker:"BTC"}, {name:"ETH/USDT", symbol:"BINANCE:ETHUSDT", ticker:"ETH"}],
    forex: [{name:"EUR/USD", symbol:"FX:EURUSD", ticker:"EURUSD"}, {name:"XAU/USD", symbol:"OANDA:XAUUSD", ticker:"XAUUSD"}],
    b3: [{name:"PETR4", symbol:"BMFBOVESPA:PETR4", ticker:"PETR4"}, {name:"VALE3", symbol:"BMFBOVESPA:VALE3", ticker:"VALE3"}]
};

let state = {
    market: 'crypto',
    symbol: 'BINANCE:BTCUSDT',
    ticker: 'BTC',
    credits: 50,
    tvWidget: null,
    analyzing: false,
    currentTF: '15' // Padrão 15 minutos
};

// ─── AUTH ──────────────────────────────────────────────────────────────────
function handleAuth() {
    const name = document.getElementById('user-name').value.trim();
    if(!name) return alert('Digite seu nome');
    document.getElementById('auth-screen').style.display = 'none';
    initChart();
}

// ─── TRADINGVIEW COM CONTROLE DE TIMEFRRAME ──────────────────────────────
function initChart() {
    document.getElementById('tv-container').innerHTML = '';
    state.tvWidget = new TradingView.widget({
        "autosize": true,
        "symbol": state.symbol,
        "interval": state.currentTF,
        "theme": "dark",
        "container_id": "tv-container",
        "locale": "br",
        "studies": ["RSI@tv-study", "MACD@tv-study", "BB@tv-study"],
        "style": "1"
    });
}

// Mudar Timeframe no gráfico e na análise
function changeTF(tf, el) {
    state.currentTF = tf;
    initChart();
    // Feedback visual
    document.querySelectorAll('.tf-card').forEach(c => c.style.borderColor = 'var(--border)');
    if(el) el.style.borderColor = 'var(--accent)';
}

// ─── ANÁLISE IA (INTEGRADA COM VERCEL BRIDGE) ──────────────────────────────
async function requestAnalysis() {
    if(state.analyzing) return;
    state.analyzing = true;
    
    const btn = document.getElementById('btn-analyze');
    const term = document.getElementById('ai-terminal');
    
    btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> CALCULANDO FLUXO...';
    term.innerHTML += `<br><span style="color:var(--accent)">» Iniciando análise macro de ${state.ticker}...</span>`;

    try {
        // Chamada via BRIDGE para evitar exposição de chave e erro de CORS
        const response = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                prompt: `Aja como o Mentor SignalSync Pro. Analise ${state.ticker} no tempo gráfico de ${state.currentTF}. 
                Considere a tese macro de 11/12 marcadores de colapso do dólar. 
                Responda APENAS um JSON: {"overall_signal": "COMPRA/VENDA/NEUTRO", "confidence": 85, "entry": "0.0", "stop_loss": "0.0", "take_profit": "0.0", "summary": "texto"}`
            })
        });

        const data = await response.json();
        // O Gemini/Claude retorna o JSON no campo text
        const intel = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));

        updateUI(intel);
        term.innerHTML += `<br><span style="color:var(--buy)">» Sucesso: ${intel.summary}</span>`;
        
    } catch (err) {
        term.innerHTML += `<br><span style="color:var(--sell)">» Erro na rede neural. Verifique logs da Vercel.</span>`;
    } finally {
        state.analyzing = false;
        btn.innerHTML = '<i class="fas fa-satellite-dish"></i> ANALISAR ATIVO';
    }
}

function updateUI(intel) {
    document.getElementById('main-signal').textContent = intel.overall_signal;
    document.getElementById('main-signal').className = `signal-value ${intel.overall_signal === 'COMPRA' ? 'BUY' : 'SELL'}`;
    document.getElementById('conf-pct').textContent = intel.confidence + '%';
    document.getElementById('conf-fill').style.width = intel.confidence + '%';
    document.getElementById('val-entry').textContent = intel.entry;
    document.getElementById('val-sl').textContent = intel.stop_loss;
    document.getElementById('val-tp').textContent = intel.take_profit;
}

// ─── TABS ─────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
    document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active-tab'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active-tab');
    if(el) el.classList.add('active');
}

setInterval(() => {
    document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('pt-BR');
}, 1000);
</script>
</body>
</html>
