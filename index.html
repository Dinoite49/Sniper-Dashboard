<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SignalSync Pro • v16.0 Ultimate</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #030508; --surface: #080C14; --surface2: #0D1220;
            --border: rgba(100,150,255,0.08); --accent: #4DFFB8; --accent2: #7B61FF;
            --buy: #00E676; --sell: #FF3D71; --gold: #FFD166; --text: #E8EDF5; --text3: #4A5568;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* --- SIDEBAR REPLICA --- */
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 16px; transition: 0.3s; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; color: #8B95A8; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; margin-bottom: 4px; }
        .nav-item:hover, .nav-item.active { background: rgba(77,255,184,0.08); color: var(--accent); }
        .nav-badge { margin-left: auto; background: var(--accent2); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }

        /* --- WALLET COMPONENT (VORTEX STYLE) --- */
        .wallet-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-top: auto; }
        .wallet-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; }
        .wallet-val { font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono'; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-nav { height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; background: rgba(8,12,20,0.9); justify-content: space-between; }
        
        /* --- DASHBOARD ELEMENTS --- */
        .content-area { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .active-tab { display: block; }
        .dash-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 16px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; }
        
        /* --- LIVE FEED --- */
        .live-feed { background: #000; border-radius: 12px; height: 150px; overflow-y: hidden; font-family: 'JetBrains Mono'; font-size: 10px; padding: 10px; border: 1px solid var(--border); }
        .feed-line { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ACTION BUTTONS --- */
        .btn-analyze { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #000; font-family: 'Syne', sans-serif; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        
        /* --- MOBILE VIEW --- */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .dash-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div style="text-align:center; margin-bottom:30px;">
        <h1 style="font-family:'Syne'; font-size:32px; font-weight:800;">SIGNAL<span style="color:var(--accent)">SYNC</span></h1>
        <p style="font-size:10px; letter-spacing:4px; color:var(--text3);">REPLICA VORTEX PRO</p>
    </div>
    <div style="background:var(--surface); padding:40px; border-radius:24px; border:1px solid var(--border); width:90%; max-width:400px;">
        <input type="text" id="user-name" placeholder="Nome do Sniper" style="width:100%; padding:14px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:#fff; margin-bottom:15px; outline:none;">
        <button class="btn-analyze" onclick="handleAuth()">Sincronizar Acesso</button>
    </div>
</div>

<aside class="sidebar">
    <div style="margin-bottom:30px;">
        <h2 style="font-family:'Syne'; font-size:20px; font-weight:800;">SIGNAL<span>SYNC</span></h2>
    </div>
    
    <div class="nav-item active" onclick="switchTab('dash', this)"><i class="fas fa-th-large"></i> Dashboard</div>
    <div class="nav-item" onclick="switchTab('signals', this)"><i class="fas fa-bolt"></i> Sinais IA <span class="nav-badge">PRO</span></div>
    <div class="nav-item" onclick="switchTab('heatmap', this)"><i class="fas fa-fire"></i> Heatmap</div>
    <div class="nav-item" onclick="switchTab('academy', this)"><i class="fas fa-graduation-cap"></i> Academy</div>
    
    <div class="wallet-card">
        <div class="wallet-item"><span>Créditos Simples:</span> <span class="wallet-val">∞</span></div>
        <div class="wallet-item"><span>Créditos PRO:</span> <span class="wallet-val" id="pro-credits">120</span></div>
        <button style="width:100%; background:var(--accent2); border:none; color:#fff; font-size:9px; padding:6px; border-radius:6px; margin-top:8px; font-weight:700;">COMPRAR CRÉDITOS</button>
    </div>
</aside>

<main class="main-content">
    <header class="top-nav">
        <div style="display:flex; align-items:center; gap:15px;">
            <select id="asset-select" onchange="initChart()" style="background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:8px; border-radius:8px; font-size:12px;">
                <option value="BINANCE:BTCUSDT">BTC/USDT (Cripto)</option>
                <option value="FX:EURUSD">EUR/USD (Forex)</option>
                <option value="OANDA:XAUUSD">GOLD (Commodities)</option>
                <option value="BMFBOVESPA:WIN1!">MINI ÍNDICE (B3)</option>
            </select>
        </div>
        <div id="live-clock" style="font-family:'JetBrains Mono'; color:var(--accent); font-size:12px;">00:00:00</div>
    </header>

    <div id="tab-dash" class="content-area active-tab">
        <div class="dash-grid">
            <div class="panel" style="padding:0; min-height:500px; overflow:hidden;">
                <div id="tv-container" style="height:100%;"></div>
            </div>
            
            <div style="display:flex; flex-direction:column; gap:16px;">
                <div class="panel">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:10px; color:var(--text3); letter-spacing:2px;">ANÁLISE INSTITUCIONAL</span>
                        <div id="status-badge" style="background:rgba(0,229,118,0.1); color:var(--buy); font-size:9px; padding:2px 8px; border-radius:4px; font-weight:800;">COMPRA</div>
                    </div>
                    <h2 id="conf-score" style="font-size:48px; font-family:'Syne'; font-weight:800; margin:10px 0;">--%</h2>
                    <div style="height:4px; background:var(--border); border-radius:2px; overflow:hidden;">
                        <div id="conf-fill" style="width:0%; height:100%; background:var(--accent); transition:1s;"></div>
                    </div>
                    <div class="live-feed" id="ai-log" style="margin-top:15px;">
                        <div class="feed-line" style="color:var(--text3)">» Aguardando inicialização do motor Vortex...</div>
                    </div>
                    <button class="btn-analyze" style="margin-top:15px;" onclick="requestVortexAnalysis()">
                        <i class="fas fa-microchip"></i> ANALISAR AGORA
                    </button>
                </div>

                <div class="panel">
                    <h4 style="font-size:12px; margin-bottom:15px; color:var(--gold)">Métricas Smart Money (SMC)</h4>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div style="background:var(--surface2); padding:10px; border-radius:8px; text-align:center;">
                            <div style="font-size:9px; color:var(--text3);">BIAS</div>
                            <div style="font-size:12px; font-weight:700; color:var(--buy);">BULLISH</div>
                        </div>
                        <div style="background:var(--surface2); padding:10px; border-radius:8px; text-align:center;">
                            <div style="font-size:9px; color:var(--text3);">LIQUIDITY</div>
                            <div style="font-size:12px; font-weight:700; color:var(--gold);">HUNTING</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let state = {
        credits: 120,
        isAnalyzing: false
    };

    function handleAuth() {
        const name = document.getElementById('user-name').value;
        if(!name) return alert("Identifique-se, Sniper.");
        document.getElementById('auth-screen').style.display = 'none';
        initChart();
        startClock();
    }

    function initChart() {
        const symbol = document.getElementById('asset-select').value;
        document.getElementById('tv-container').innerHTML = '';
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "container_id": "tv-container",
            "hide_side_toolbar": false,
            "studies": ["RSI@tv-study", "MASimple@tv-study!length=20"]
        });
    }

    async function requestVortexAnalysis() {
        if(state.isAnalyzing) return;
        state.isAnalyzing = true;
        
        const log = document.getElementById('ai-log');
        const btn = event.currentTarget;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CALCULANDO...';
        
        addLog("» Mapeando Order Blocks institucionais...");
        addLog("» Verificando liquidez acima da máxima diária...");
        
        try {
            // Chamada para a sua API Vercel que configuramos anteriormente
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: `Analise o ativo ${document.getElementById('asset-select').value} usando conceitos de Smart Money (SMC) e Wyckoff. Responda em JSON: {"score": 85, "sentiment": "COMPRA", "reason": "Mapeamento de Order Block em H1 concluído."}`
                })
            });

            const data = await response.json();
            const intel = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));

            // Atualização de UI estilo Vortex
            document.getElementById('conf-score').innerText = intel.score + "%";
            document.getElementById('conf-fill').style.width = intel.score + "%";
            document.getElementById('status-badge').innerText = intel.sentiment;
            document.getElementById('status-badge').style.color = intel.sentiment === "COMPRA" ? "var(--buy)" : "var(--sell)";
            
            addLog(`» RESULTADO: ${intel.reason}`, "var(--accent)");
            state.credits--;
            document.getElementById('pro-credits').innerText = state.credits;

        } catch (e) {
            addLog("» Erro na sincronização neural. Verifique créditos PRO.", "var(--sell)");
        } finally {
            state.isAnalyzing = false;
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-microchip"></i> ANALISAR AGORA';
        }
    }

    function addLog(msg, color = "#4A5568") {
        const log = document.getElementById('ai-log');
        const line = document.createElement('div');
        line.className = 'feed-line';
        line.style.color = color;
        line.innerText = msg;
        log.prepend(line);
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        // Lógica de troca de abas aqui
    }

    function startClock() {
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);
    }
</script>
</body>
</html>
