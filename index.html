<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SignalSync Pro • v13.5 Official</title>
    
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #050505; --card: rgba(13, 13, 13, 0.9); --accent: #00E5FF; 
            --accent-glow: rgba(0, 229, 255, 0.3); --red: #FF3B3B; --green: #00FF88;
            --gold: #F5B041; --text: #F9FAFB; --border: rgba(255, 255, 255, 0.05);
            --glass: blur(20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* ESTRUTURA BASE ADAPTATIVA */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: row; /* Desktop Default */
            overflow: hidden; 
            transition: all 0.3s ease;
        }

        /* --- MODO MOBILE FORÇADO --- */
        body.mobile-view { flex-direction: column !important; }
        body.mobile-view .sidebar { 
            width: 100% !important; height: 70px !important; flex-direction: row !important; 
            position: fixed !important; bottom: 0 !important; border-right: none !important; 
            border-top: 1px solid var(--border) !important; padding: 0 10px !important; justify-content: space-around !important;
        }
        body.mobile-view .sidebar span, body.mobile-view .logo-area { display: none !important; }
        body.mobile-view .app-main { height: calc(100vh - 70px) !important; }
        body.mobile-view .grid-layout { grid-template-columns: 1fr !important; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 260px; background: #080808; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 25px; gap: 10px; z-index: 100;
        }
        .nav-link { 
            display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px;
            color: #666; cursor: pointer; transition: 0.3s; font-weight: 600; text-decoration: none;
        }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.03); color: var(--accent); }

        /* --- CONTEÚDO --- */
        .app-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { 
            height: 70px; border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; justify-content: space-between; padding: 0 30px; background: rgba(5,5,5,0.8);
        }

        .glowing-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            backdrop-filter: var(--glass); padding: 20px; transition: 0.3s;
        }
        .grid-layout { display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px; }

        .btn-sync { 
            background: linear-gradient(135deg, #00E5FF, #007AFF); color: #000; 
            border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%;
        }

        /* --- CHAVE DE ALTERAÇÃO (TOGGLE) --- */
        .view-switcher {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 8px 12px; border-radius: 10px; color: var(--accent); cursor: pointer;
            font-size: 12px; display: flex; align-items: center; gap: 8px;
        }

        @media (max-width: 900px) {
            body:not(.desktop-force) { flex-direction: column; }
            body:not(.desktop-force) .sidebar { width: 100%; height: 70px; flex-direction: row; position: fixed; bottom: 0; border-right: none; border-top: 1px solid var(--border); justify-content: space-around; padding: 0 10px; }
            body:not(.desktop-force) .sidebar span, body:not(.desktop-force) .logo-area { display: none; }
            body:not(.desktop-force) .grid-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body id="app-body">

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
        <div class="glowing-card" style="width:90%; max-width:400px; text-align:center;">
            <h1 style="font-weight:800; margin-bottom:10px;">SIGNALSYNC <span style="color:var(--accent)">PRO</span></h1>
            <p style="font-size:12px; color:#666; margin-bottom:25px;">Módulo Sniper v13.5 Oficial</p>
            <button class="btn-sync" onclick="startApp()">Acessar Terminal</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="logo-area" style="font-weight:800; font-size:20px; margin-bottom:40px;">SIGNAL<span style="color:var(--accent)">SYNC</span></div>
        <div class="nav-link active" data-tab="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></div>
        <div class="nav-link" data-tab="signals"><i class="fas fa-bolt"></i><span>Sinais Pro</span></div>
        <div class="nav-link" data-tab="risk"><i class="fas fa-calculator"></i><span>Risco Sniper</span></div>
        <div class="nav-link" data-tab="account"><i class="fas fa-user-shield"></i><span>Minha Conta</span></div>
    </aside>

    <main class="app-main">
        <header class="top-header">
            <div style="display:flex; align-items:center; gap:15px;">
                <div class="view-switcher" onclick="toggleView()">
                    <i class="fas fa-mobile-alt" id="view-icon"></i> <span id="view-text">Alternar Visão</span>
                </div>
            </div>
            <div style="display:flex; gap:20px; align-items:center;">
                <div style="background:rgba(0,229,255,0.1); color:var(--accent); padding:5px 12px; border-radius:100px; font-size:11px; font-weight:700;">120 CRÉDITOS</div>
                <div id="live-clock" style="font-family:'JetBrains Mono'; font-size:12px; color:var(--accent);">00:00:00</div>
            </div>
        </header>

        <div id="tab-dashboard" class="main-stage" style="padding:20px; overflow-y:auto; flex:1;">
            <div class="grid-layout">
                <div class="glowing-card" style="padding:0; min-height:500px; overflow:hidden;">
                    <div id="tv-main-chart" style="height:100%; width:100%;"></div>
                </div>

                <div class="glowing-card">
                    <div style="text-align:center; margin-bottom:25px;">
                        <span style="background:rgba(0,255,136,0.1); color:var(--green); padding:4px 10px; border-radius:5px; font-size:10px; font-weight:800;">IA SIGNALSYNC PRO</span>
                        <h2 id="aura-score" style="font-size:45px; font-weight:800; margin:10px 0;">--%</h2>
                        <p id="aura-mood" style="color:var(--gold); font-size:12px; font-weight:600;">Sincronizando com o Mercado...</p>
                    </div>

                    <div id="analysis-box" class="terminal-box" style="background:#000; padding:15px; border-radius:12px; font-size:11px; font-family:'JetBrains Mono'; border:1px solid var(--border); margin-bottom:20px; min-height:150px;">
                        Aguardando comando do Sniper...
                    </div>

                    <button class="btn-sync" onclick="runSignalSync()">
                        <i class="fas fa-brain"></i> ANALISAR AGORA (1 CRÉDITO)
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentPair = "FX:EURUSD";

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            initChart();
        }

        // --- ALTERNADOR DE VISÃO (CHAVE) ---
        function toggleView() {
            const body = document.getElementById('app-body');
            const icon = document.getElementById('view-icon');
            const text = document.getElementById('view-text');

            if (body.classList.contains('mobile-view')) {
                body.classList.remove('mobile-view');
                body.classList.add('desktop-force');
                icon.className = "fas fa-desktop";
                text.innerText = "Modo Desktop Ativo";
            } else {
                body.classList.add('mobile-view');
                body.classList.remove('desktop-force');
                icon.className = "fas fa-mobile-alt";
                text.innerText = "Modo Mobile Ativo";
            }
            // Força o resize do gráfico do TradingView
            window.dispatchEvent(new Event('resize'));
        }

        function initChart() {
            new TradingView.widget({
                "autosize": true, "symbol": currentPair, "interval": "15",
                "theme": "dark", "style": "1", "container_id": "tv-main-chart",
                "locale": "br", "hide_side_toolbar": false
            });
        }

        async function runSignalSync() {
            const box = document.getElementById('analysis-box');
            const score = document.getElementById('aura-score');
            const mood = document.getElementById('aura-mood');

            box.innerHTML = "🔍 Conectando à ponte segura SignalSync Pro v13.5...";
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: `Aja como o Mentor SignalSync Pro. Analise o par ${currentPair}. Identifique se há Trap ou Liquidez. Responda em JSON: {"score": 0-100, "mood": "string", "advice": "string"}` 
                    })
                });
                const data = await response.json();
                const intel = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));

                score.innerText = intel.score + "%";
                mood.innerText = intel.mood;
                box.innerHTML = `<b>[ANÁLISE SNIPER]:</b><br>${intel.advice}`;

            } catch(e) {
                box.innerHTML = "❌ Erro: Verifique a conexão com a Vercel.";
            }
        }

        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
